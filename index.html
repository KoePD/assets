<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>KØ-PÅDD Scoreboard Piler</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        #arrow-container { 
            position: relative; 
            width: 100%; 
            height: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 60px; /* Avstand til tallene */
            pointer-events: none;
        }
        
        .arrow-shape { 
            width: 0; 
            height: 0; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
            opacity: 0; /* Skjult som standard */
            transition: none; 
        }

        #arrowL {
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 20px solid #000000;
        }
        
        #arrowR {
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #000000;
        }
        
        /* Vises kun når klassen 'active' legges til via JS */
        .active { 
            opacity: 1 !important; 
            transition: opacity 0.2s ease-in-out !important;
        }
    </style>
</head>
<body>

    <div id="arrow-container">
        <div id="arrowL" class="arrow-shape"></div>
        <div id="arrowR" class="arrow-shape"></div>
    </div>
